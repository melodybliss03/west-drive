services:
  db:
    image: postgres:16-alpine
    container_name: westdrive-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: westdrive
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - '5432:5432'
    volumes:
      - westdrive_pg_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d westdrive']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: westdrive-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Development defaults are explicit to speed up onboarding.
      NODE_ENV: development
      PORT: 3000
      CORS_ORIGIN: http://localhost:3001
      DATABASE_URL: postgresql://postgres:root@db:5432/westdrive
      DB_SSL: 'false'
      DB_RESET: ${DB_RESET:-false}
      JWT_ACCESS_SECRET: dev_access_secret_change_me
      JWT_REFRESH_SECRET: dev_refresh_secret_change_me
      ADMIN_EMAIL: admin@westdrive.fr
      ADMIN_PASSWORD: ChangeMeStrongPassword
    ports:
      - '3000:3000'

volumes:
  westdrive_pg_data:
